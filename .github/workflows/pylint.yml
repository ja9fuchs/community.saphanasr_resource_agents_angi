name: Pylint (advisory)

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'

jobs:
  pylint:
    name: Pylint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Run
        run: |
          find . -type f -name '*.py' \
            | xargs pylint --disable=duplicate-code
