name: Perlcritic (advisory)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.pm'
      - 'hooks/**'
      - 'tools/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.pm'
      - 'hooks/**'
      - 'tools/**'

jobs:
  perlcritic:
    name: Perlcritic (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get -y install libtest-perl-critic-perl
      - name: Run
        run: |
          find ra alerts hooks tools scripts -type f \
            -exec awk '/^#!.*perl/{print FILENAME} {nextfile}' {} + \
            | xargs perlcritic --gentle
